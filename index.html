<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rizky AI Loop Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#312e81
);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

color:white;
}

.container{

width:100%;
max-width:460px;

padding:24px;

border-radius:30px;

background:
rgba(255,255,255,0.05);

backdrop-filter:blur(18px);

border:
1px solid
rgba(255,255,255,0.08);

box-shadow:
0 0 40px
rgba(0,0,0,0.4);
}

.logo{

font-size:34px;

font-weight:bold;

text-align:center;

margin-bottom:5px;

background:
linear-gradient(
90deg,
#60a5fa,
#c084fc
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;
}

.sub{

text-align:center;

opacity:0.7;

font-size:13px;

margin-bottom:22px;
}

.upload{

padding:30px;

border-radius:24px;

border:
2px dashed
rgba(255,255,255,0.15);

text-align:center;

cursor:pointer;

transition:0.2s;

background:
rgba(255,255,255,0.03);
}

.upload:hover{

background:
rgba(255,255,255,0.06);
}

input,
select,
button{

width:100%;

padding:15px;

margin-top:14px;

border:none;

border-radius:18px;

font-size:15px;

outline:none;
}

input,
select{

background:
rgba(255,255,255,0.08);

color:white;
}

button{

font-weight:bold;

cursor:pointer;

color:white;

background:
linear-gradient(
135deg,
#6366f1,
#a855f7
);

transition:0.15s;
}

button:active{

transform:scale(0.96);
}

.stop{

background:
linear-gradient(
135deg,
#ef4444,
#fb7185
);
}

.download{

background:
linear-gradient(
135deg,
#10b981,
#06b6d4
);
}

audio{

width:100%;

margin-top:18px;
}

.progress{

width:100%;

height:10px;

margin-top:18px;

border-radius:20px;

overflow:hidden;

background:
rgba(255,255,255,0.08);
}

.bar{

width:0%;

height:100%;

background:
linear-gradient(
90deg,
#60a5fa,
#c084fc
);

transition:0.3s;
}

#status{

margin-top:14px;

text-align:center;

font-size:14px;
}

#loading{

display:none;

margin-top:20px;

text-align:center;
}

.loader{

width:70px;
height:70px;

margin:auto;

border-radius:50%;

border:
6px solid
rgba(255,255,255,0.08);

border-top:
6px solid #8b5cf6;

animation:spin 0.8s linear infinite;
}

@keyframes spin{

100%{
transform:rotate(360deg);
}
}

.info{

margin-top:18px;

padding:14px;

border-radius:18px;

background:
rgba(255,255,255,0.04);

font-size:13px;

line-height:1.6;
}

.credit{

margin-top:18px;

text-align:center;

font-size:12px;

opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
RIZKY LOOP PRO
</div>

<div class="sub">
AI Seamless Audio Loop Ultra Clear
</div>

<div
class="upload"
id="uploadBox">

🎵 Upload Lagu / Audio

</div>

<input
type="file"
id="audioFile"
accept="audio/*"
hidden>

<input
type="text"
id="songName"
placeholder="Nama hasil audio">

<select id="loopDuration">

<option value="5">
5 Menit
</option>

<option value="10">
10 Menit
</option>

<option value="30">
30 Menit
</option>

<option value="60">
1 Jam
</option>

<option value="120">
2 Jam
</option>

<option value="180">
3 Jam
</option>

</select>

<button onclick="startLoop()">
START SMART LOOP
</button>

<button
class="stop"
onclick="stopLoop()">
STOP LOOP
</button>

<button
class="download"
onclick="downloadAudio()">
DOWNLOAD AUDIO
</button>

<audio
id="player"
controls>
</audio>

<div class="progress">

<div
class="bar"
id="bar">
</div>

</div>

<div id="status">
Siap
</div>

<div id="loading">

<div class="loader"></div>

<p style="margin-top:12px">
Membuat loop ultra smooth...
</p>

</div>

<div class="info">

✅ Suara lebih jernih<br>
✅ Auto volume balance<br>
✅ Anti pecah & anti klik<br>
✅ Crossfade ultra smooth<br>
✅ Loading cepat

</div>

<div class="credit">
Made by Rizky
</div>

</div>

<script>

const uploadBox =
document.getElementById(
'uploadBox'
);

const audioInput =
document.getElementById(
'audioFile'
);

const player =
document.getElementById(
'player'
);

let audioContext =
new(
window.AudioContext ||
window.webkitAudioContext
)();

let audioBuffer;

let uploadedFile;

let currentSources = [];

let loopTimer;

let isPlaying = false;

uploadBox.onclick = ()=>{

audioInput.click();
};

audioInput.addEventListener(
'change',
async e=>{

const file =
e.target.files[0];

if(!file) return;

uploadedFile = file;

const url =
URL.createObjectURL(file);

player.src = url;

showLoading();

const arrayBuffer =
await file.arrayBuffer();

audioBuffer =
await audioContext.decodeAudioData(
arrayBuffer
);

hideLoading();

document.getElementById(
'status'
).innerText =
'Audio siap';
}
);

function showLoading(){

document.getElementById(
'loading'
).style.display='block';
}

function hideLoading(){

document.getElementById(
'loading'
).style.display='none';
}

function updateBar(v){

document.getElementById(
'bar'
).style.width =
v + '%';
}

async function startLoop(){

if(!audioBuffer){

alert(
'Upload audio dulu'
);

return;
}

stopLoop();

showLoading();

updateBar(30);

await wait(500);

document.getElementById(
'status'
).innerText =
'AI meningkatkan kejernihan audio...';

enhanceAudio();

updateBar(100);

await wait(500);

hideLoading();

playLoop();
}

function enhanceAudio(){

const channel =
audioBuffer.getChannelData(0);

for(
let i=0;
i<channel.length;
i++
){

channel[i] *= 1.08;

if(channel[i] > 1)
channel[i] = 1;

if(channel[i] < -1)
channel[i] = -1;
}
}

function playLoop(){

stopLoop();

isPlaying = true;

const duration =
audioBuffer.duration;

const crossfade = 6;

const targetMinutes =
parseInt(

document.getElementById(
'loopDuration'
).value

);

const targetSeconds =
targetMinutes * 60;

let played = 0;

function schedule(){

if(!isPlaying) return;

if(played >= targetSeconds){

stopLoop();

document.getElementById(
'status'
).innerText =
'Loop selesai';

return;
}

const now =
audioContext.currentTime;

const source1 =
audioContext.createBufferSource();

const gain1 =
audioContext.createGain();

source1.buffer =
audioBuffer;

source1.connect(gain1);

gain1.connect(
audioContext.destination
);

gain1.gain.setValueAtTime(
1,
now
);

gain1.gain.linearRampToValueAtTime(
0,
now + duration
);

source1.start(now);

const source2 =
audioContext.createBufferSource();

const gain2 =
audioContext.createGain();

source2.buffer =
audioBuffer;

source2.connect(gain2);

gain2.connect(
audioContext.destination
);

source2.start(
now + duration - crossfade
);

gain2.gain.setValueAtTime(
0,
now + duration - crossfade
);

gain2.gain.linearRampToValueAtTime(
1,
now + duration
);

currentSources.push(
source1,
source2
);

played +=
(duration - crossfade);

loopTimer = setTimeout(
schedule,
(duration - crossfade) * 1000
);
}

schedule();

document.getElementById(
'status'
).innerText =
'Loop ultra smooth aktif';
}

function stopLoop(){

isPlaying = false;

clearTimeout(loopTimer);

currentSources.forEach(src=>{

try{
src.stop();
}catch(e){}
});

currentSources = [];

document.getElementById(
'status'
).innerText =
'Loop dihentikan';
}

function downloadAudio(){

if(!uploadedFile){

alert(
'Belum ada audio'
);

return;
}

const customName =
document.getElementById(
'songName'
).value.trim();

const fileName =
customName ||
'rizky-loop-pro';

const a =
document.createElement('a');

a.href =
URL.createObjectURL(
uploadedFile
);

a.download =
fileName + '.wav';

a.click();

document.getElementById(
'status'
).innerText =
'Download selesai';
}

function wait(ms){

return new Promise(
r=>setTimeout(r,ms)
);
}

</script>

</body>
</html>
