<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Rizky Screen Studio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

background:
linear-gradient(
135deg,
#050510,
#161633,
#2a1460
);

background-size:300% 300%;

animation:bg 12s ease infinite;

color:white;
}

@keyframes bg{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}
}

.glow{

position:absolute;

width:500px;
height:500px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(120,90,255,0.25),
transparent
);

filter:blur(90px);

animation:float 7s ease infinite;
}

.glow:nth-child(1){

top:-180px;
left:-150px;
}

.glow:nth-child(2){

bottom:-180px;
right:-150px;

animation-delay:2s;
}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(35px);
}
}

.container{

position:relative;

width:94%;
max-width:520px;

padding:28px;

border-radius:34px;

background:
rgba(255,255,255,0.06);

backdrop-filter:blur(24px);

border:
1px solid
rgba(255,255,255,0.08);

box-shadow:
0 0 55px
rgba(120,90,255,0.3);

z-index:5;
}

.logo{

font-size:38px;

font-weight:bold;

text-align:center;

margin-bottom:6px;

background:
linear-gradient(
90deg,
#8f7fff,
#ff7eff
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;
}

.sub{

text-align:center;

font-size:13px;

opacity:0.7;

margin-bottom:24px;
}

button{

position:relative;

overflow:hidden;

width:100%;

padding:16px;

margin-top:14px;

border:none;

border-radius:18px;

font-size:16px;

font-weight:bold;

cursor:pointer;

color:white;

background:
linear-gradient(
135deg,
#715dff,
#b24dff
);

transition:0.15s ease;

box-shadow:
0 10px 25px
rgba(120,90,255,0.35);
}

button:hover{

transform:translateY(-2px);

box-shadow:
0 0 35px
rgba(120,90,255,0.55);
}

button:active{

transform:scale(0.93);
}

button::after{

content:'';

position:absolute;

top:50%;
left:50%;

width:0;
height:0;

border-radius:50%;

background:
rgba(255,255,255,0.2);

transform:
translate(-50%,-50%);

transition:0.4s;
}

button:active::after{

width:320px;
height:320px;
}

.stop{

background:
linear-gradient(
135deg,
#ff4d6d,
#ff7b7b
);
}

video{

width:100%;

margin-top:20px;

border-radius:24px;

background:black;

box-shadow:
0 0 30px
rgba(120,90,255,0.3);
}

canvas{

width:100%;

height:90px;

margin-top:18px;

border-radius:18px;

background:
rgba(255,255,255,0.03);
}

.progress{

width:100%;

height:12px;

margin-top:18px;

border-radius:30px;

overflow:hidden;

background:
rgba(255,255,255,0.08);
}

.bar{

width:0%;

height:100%;

border-radius:30px;

background:
linear-gradient(
90deg,
#7d7fff,
#ff7eff
);

transition:0.3s;
}

#status{

text-align:center;

margin-top:14px;

font-size:14px;

opacity:0.85;
}

#loading{

display:none;

margin-top:24px;

text-align:center;
}

.loader{

width:86px;
height:86px;

margin:auto;

border-radius:50%;

border:
7px solid
rgba(255,255,255,0.08);

border-top:
7px solid #9d7dff;

animation:spin 0.8s linear infinite;

box-shadow:
0 0 35px
rgba(120,90,255,0.45);
}

@keyframes spin{

100%{
transform:rotate(360deg);
}
}

.loadingText{

margin-top:16px;

font-size:14px;

animation:pulse 1s infinite;
}

@keyframes pulse{

0%{
opacity:0.3;
}

50%{
opacity:1;
}

100%{
opacity:0.3;
}
}

.info{

margin-top:18px;

text-align:center;

font-size:12px;

opacity:0.6;
}

.credit{

margin-top:12px;

text-align:center;

font-size:13px;

color:#d7c2ff;
}

</style>
</head>

<body>

<div class="glow"></div>
<div class="glow"></div>

<div class="container">

<div class="logo">
RIZKY SCREEN
</div>

<div class="sub">
Screen Recorder & Live Capture
</div>

<button onclick="startScreen()">
TAMPILKAN LAYAR
</button>

<button onclick="startRecord()">
MULAI RECORD
</button>

<button
class="stop"
onclick="stopRecord()">
STOP RECORD
</button>

<video
id="screenVideo"
autoplay
playsinline
controls>
</video>

<canvas id="visualizer"></canvas>

<div class="progress">

<div
class="bar"
id="bar">

</div>

</div>

<div id="status">
Siap merekam layar
</div>

<div id="loading">

<div class="loader"></div>

<div
class="loadingText"
id="loadingText">

Memulai AI capture...

</div>

</div>

<div class="info">

Live Screen • HD Record • Offline Mode

</div>

<div class="credit">

Made by Rizky

</div>

</div>

<script>

const video =
document.getElementById(
'screenVideo'
);

let mediaRecorder;

let recordedChunks = [];

let screenStream;

function setLoading(text){

document.getElementById(
'loading'
).style.display='block';

document.getElementById(
'loadingText'
).innerText=text;
}

function hideLoading(){

document.getElementById(
'loading'
).style.display='none';
}

function updateBar(value){

document.getElementById(
'bar'
).style.width =
value + '%';
}

async function startScreen(){

try{

setLoading(
'Meminta izin layar...'
);

updateBar(20);

screenStream =
await navigator.mediaDevices.getDisplayMedia({

video:true,
audio:true

});

updateBar(100);

hideLoading();

video.srcObject =
screenStream;

document.getElementById(
'status'
).innerText =
'Layar berhasil ditampilkan';

}catch(err){

hideLoading();

alert(
'Izin layar ditolak'
);

console.log(err);
}
}

async function startRecord(){

if(!screenStream){

await startScreen();
}

recordedChunks = [];

mediaRecorder =
new MediaRecorder(screenStream);

mediaRecorder.ondataavailable =
e=>{

if(e.data.size > 0){

recordedChunks.push(
e.data
);
}
};

mediaRecorder.onstop = ()=>{

const blob =
new Blob(recordedChunks,{

type:'video/webm'

});

const url =
URL.createObjectURL(blob);

const a =
document.createElement('a');

a.href = url;

a.download =
'rizky-screen-record.webm';

a.click();

document.getElementById(
'status'
).innerText =
'Recording selesai';
};

mediaRecorder.start();

document.getElementById(
'status'
).innerText =
'Recording dimulai';

fakeRealtimeProgress();
}

function stopRecord(){

if(mediaRecorder){

mediaRecorder.stop();
}

updateBar(100);

document.getElementById(
'status'
).innerText =
'Menghentikan recording...';
}

async function fakeRealtimeProgress(){

let progress = 0;

while(progress < 95){

await wait(900);

progress += 3;

updateBar(progress);

if(!mediaRecorder) break;
}
}

function wait(ms){

return new Promise(
r=>setTimeout(r,ms)
);
}

const canvas =
document.getElementById(
'visualizer'
);

const ctx =
canvas.getContext('2d');

canvas.width =
canvas.offsetWidth;

canvas.height =
canvas.offsetHeight;

function animate(){

requestAnimationFrame(
animate
);

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

for(
let i=0;
i<45;
i++
){

const h =
Math.random()*85;

ctx.fillStyle =
`hsl(${i*7},100%,60%)`;

ctx.fillRect(
i*11,
canvas.height-h,
8,
h
);
}
}

animate();

</script>

</body>
</html>
