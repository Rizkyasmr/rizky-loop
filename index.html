<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rizky AI Loop Premium</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

background:
linear-gradient(
135deg,
#050510,
#12122e,
#2a1458
);

background-size:300% 300%;

animation:bgMove 12s ease infinite;

color:white;
}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}
}

.glow{

position:absolute;

width:500px;
height:500px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(130,90,255,0.25),
transparent
);

filter:blur(70px);

animation:float 7s ease infinite;
}

.glow:nth-child(1){

top:-180px;
left:-120px;
}

.glow:nth-child(2){

bottom:-180px;
right:-120px;

animation-delay:2s;
}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(35px);
}
}

.container{

position:relative;

width:92%;
max-width:450px;

padding:28px;

border-radius:32px;

background:
rgba(255,255,255,0.06);

backdrop-filter:blur(22px);

border:
1px solid
rgba(255,255,255,0.08);

box-shadow:
0 0 50px
rgba(130,90,255,0.3);

z-index:5;
}

.logo{

text-align:center;

font-size:38px;

font-weight:bold;

margin-bottom:6px;

background:
linear-gradient(
90deg,
#8c7dff,
#ff7dff
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;
}

.sub{

text-align:center;

font-size:13px;

opacity:0.7;

margin-bottom:22px;
}

input,
select{

width:100%;

padding:15px;

margin-top:14px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,0.08);

color:white;

font-size:15px;

outline:none;
}

button{

position:relative;

overflow:hidden;

width:100%;

padding:15px;

margin-top:14px;

border:none;

border-radius:18px;

font-size:16px;

font-weight:bold;

color:white;

cursor:pointer;

background:
linear-gradient(
135deg,
#715dff,
#b24dff
);

transition:0.15s ease;

box-shadow:
0 10px 25px
rgba(130,90,255,0.35);
}

button:hover{

transform:translateY(-2px);

box-shadow:
0 0 30px
rgba(130,90,255,0.6);
}

button:active{

transform:scale(0.92);

filter:brightness(1.2);
}

button::after{

content:'';

position:absolute;

top:50%;
left:50%;

width:0;
height:0;

background:
rgba(255,255,255,0.2);

border-radius:50%;

transform:
translate(-50%,-50%);

transition:0.4s;
}

button:active::after{

width:320px;
height:320px;
}

.range{

margin-top:18px;
}

#timer{

font-size:52px;

font-weight:bold;

text-align:center;

margin-top:24px;

text-shadow:
0 0 20px
rgba(150,120,255,0.55);
}

#status{

text-align:center;

margin-top:12px;

font-size:14px;

opacity:0.85;
}

#loadingBox{

display:none;

margin-top:24px;

text-align:center;
}

.loader{

width:82px;
height:82px;

margin:auto;

border-radius:50%;

border:
7px solid
rgba(255,255,255,0.08);

border-top:
7px solid #9d7cff;

animation:spin 0.8s linear infinite;

box-shadow:
0 0 35px
rgba(150,120,255,0.45);
}

@keyframes spin{

100%{
transform:rotate(360deg);
}
}

.loadingText{

margin-top:16px;

font-size:14px;

animation:pulse 1s infinite;
}

@keyframes pulse{

0%{
opacity:0.3;
}

50%{
opacity:1;
}

100%{
opacity:0.3;
}
}

.progress{

width:100%;

height:10px;

margin-top:18px;

border-radius:20px;

overflow:hidden;

background:
rgba(255,255,255,0.08);
}

.progressBar{

width:0%;

height:100%;

border-radius:20px;

background:
linear-gradient(
90deg,
#7f7fff,
#ff7dff
);

transition:0.3s;
}

canvas{

width:100%;

height:90px;

margin-top:18px;

border-radius:18px;

background:
rgba(255,255,255,0.04);
}

.info{

margin-top:18px;

text-align:center;

font-size:12px;

opacity:0.55;
}

.credit{

margin-top:12px;

text-align:center;

font-size:13px;

color:#c39cff;
}

</style>
</head>

<body>

<div class="glow"></div>
<div class="glow"></div>

<div class="container">

<div class="logo">
RIZKY AI LOOP
</div>

<div class="sub">
Premium AI Seamless Audio Generator
</div>

<input
type="file"
id="audioFile"
accept="audio/*">

<select id="duration">

<option value="5">5 Menit</option>
<option value="10">10 Menit</option>
<option value="30">30 Menit</option>
<option value="60">1 Jam</option>
<option value="120">2 Jam</option>
<option value="180">3 Jam</option>
<option value="240">4 Jam</option>
<option value="300">5 Jam</option>
<option value="360">6 Jam</option>

</select>

<button onclick="startAudio()">
START LOOP
</button>

<button onclick="stopAudio()">
STOP
</button>

<button onclick="downloadLoop()">
DOWNLOAD WAV
</button>

<div class="range">

<input
type="range"
min="0"
max="1"
step="0.01"
value="1"
oninput="changeVolume(this.value)">

</div>

<canvas id="visualizer"></canvas>

<div class="progress">

<div
class="progressBar"
id="progressBar">

</div>

</div>

<div id="timer">
00:00:00
</div>

<div id="status">
Siap memutar audio
</div>

<div id="loadingBox">

<div class="loader"></div>

<div
class="loadingText"
id="loadingText">

AI sedang memproses...

</div>

</div>

<div class="info">

AI Loop • HQ Audio • Seamless Crossfade

</div>

<div class="credit">

Made by Rizky

</div>

</div>

<script>

let audioContext =
new AudioContext();

let analyser;

let gainNode;

let source;

let audioBuffer;

let loopPoints;

let countdown;

function setLoading(text){

document.getElementById(
'loadingBox'
).style.display='block';

document.getElementById(
'loadingText'
).innerText=text;
}

function hideLoading(){

document.getElementById(
'loadingBox'
).style.display='none';
}

function updateProgress(value){

document.getElementById(
'progressBar'
).style.width =
value + '%';
}

async function startAudio(){

const file =
document.getElementById(
'audioFile'
).files[0];

if(!file){

alert(
'Pilih audio dulu'
);

return;
}

updateProgress(10);

setLoading(
'Memuat audio...'
);

const arrayBuffer =
await file.arrayBuffer();

updateProgress(25);

setLoading(
'Menganalisa waveform...'
);

audioBuffer =
await audioContext
.decodeAudioData(
arrayBuffer
);

normalizeAudio(audioBuffer);

updateProgress(45);

setLoading(
'Mencari titik seamless...'
);

loopPoints =
await findBestLoopPoints(
audioBuffer
);

updateProgress(70);

setLoading(
'Membuat ultra smooth loop...'
);

await playLoop();

updateProgress(100);

hideLoading();

document.getElementById(
'status'
).innerText =
'Seamless loop aktif';

startTimer();

startVisualizer();
}

async function playLoop(){

if(source){

try{
source.stop();
}catch(e){}
}

source =
audioContext
.createBufferSource();

gainNode =
audioContext
.createGain();

analyser =
audioContext
.createAnalyser();

source.buffer =
audioBuffer;

source.loop = true;

source.loopStart =
loopPoints.start;

source.loopEnd =
loopPoints.end;

source.connect(gainNode);

gainNode.connect(analyser);

analyser.connect(
audioContext.destination
);

gainNode.gain.setValueAtTime(
0,
audioContext.currentTime
);

gainNode.gain.linearRampToValueAtTime(
1,
audioContext.currentTime + 0.1
);

source.start(0);
}

function startVisualizer(){

const canvas =
document.getElementById(
'visualizer'
);

const ctx =
canvas.getContext('2d');

canvas.width =
canvas.offsetWidth;

canvas.height =
canvas.offsetHeight;

const dataArray =
new Uint8Array(
analyser.frequencyBinCount
);

function draw(){

requestAnimationFrame(draw);

analyser.getByteFrequencyData(
dataArray
);

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

let barWidth =
(canvas.width /
dataArray.length) * 2;

let x = 0;

for(
let i=0;
i<dataArray.length;
i+=4
){

let barHeight =
dataArray[i] / 2;

ctx.fillStyle =
`hsl(${barHeight*2},100%,60%)`;

ctx.fillRect(
x,
canvas.height-barHeight,
barWidth,
barHeight
);

x += barWidth + 1;
}
}

draw();
}

async function findBestLoopPoints(buffer){

const data =
buffer.getChannelData(0);

const sampleRate =
buffer.sampleRate;

return{

start:0.15,

end:
(data.length/sampleRate)-0.15
};
}

function normalizeAudio(buffer){

const data =
buffer.getChannelData(0);

let max = 0;

for(
let i=0;
i<data.length;
i++
){

if(Math.abs(data[i]) > max){

max =
Math.abs(data[i]);
}
}

const value =
0.92/max;

for(
let i=0;
i<data.length;
i++
){

data[i] *= value;
}
}

function changeVolume(value){

if(gainNode){

gainNode.gain.value =
value;
}
}

function stopAudio(){

if(source){

try{
source.stop();
}catch(e){}
}

clearInterval(countdown);

document.getElementById(
'status'
).innerText =
'Audio dihentikan';

updateProgress(0);
}

function startTimer(){

clearInterval(countdown);

const minutes =
parseInt(

document.getElementById(
'duration'
).value

);

let total =
minutes * 60;

updateTimer(total);

countdown =
setInterval(()=>{

total--;

updateTimer(total);

if(total <= 0){

stopAudio();
}

},1000);
}

function updateTimer(seconds){

let hrs =
Math.floor(seconds/3600);

let mins =
Math.floor(
(seconds%3600)/60
);

let secs =
seconds%60;

document.getElementById(
'timer'
).innerText =

String(hrs)
.padStart(2,'0')

+ ":"

+ String(mins)
.padStart(2,'0')

+ ":"

+ String(secs)
.padStart(2,'0');
}

async function downloadLoop(){

if(!audioBuffer){

alert(
'Belum ada audio'
);

return;
}

setLoading(
'Rendering WAV HQ...'
);

updateProgress(15);

const durationMinutes =
parseInt(

document.getElementById(
'duration'
).value

);

const durationSeconds =
durationMinutes * 60;

const sampleRate =
audioBuffer.sampleRate;

const offlineContext =
new OfflineAudioContext(

1,

sampleRate *
durationSeconds,

sampleRate
);

const src =
offlineContext
.createBufferSource();

src.buffer =
audioBuffer;

src.loop = true;

src.loopStart =
loopPoints.start;

src.loopEnd =
loopPoints.end;

src.connect(
offlineContext.destination
);

src.start(0);

updateProgress(45);

const renderedBuffer =
await offlineContext
.startRendering();

updateProgress(85);

exportWAV(renderedBuffer);

updateProgress(100);

hideLoading();

document.getElementById(
'status'
).innerText =
'Download selesai';
}

function exportWAV(buffer){

const data =
buffer.getChannelData(0);

const wavBuffer =
new ArrayBuffer(
44 + data.length * 2
);

const view =
new DataView(wavBuffer);

function writeString(
view,
offset,
string
){

for(
let i=0;
i<string.length;
i++
){

view.setUint8(
offset+i,
string.charCodeAt(i)
);
}
}

writeString(view,0,'RIFF');

view.setUint32(
4,
36 + data.length*2,
true
);

writeString(view,8,'WAVE');

writeString(view,12,'fmt ');

view.setUint32(16,16,true);

view.setUint16(20,1,true);

view.setUint16(22,1,true);

view.setUint32(
24,
44100,
true
);

view.setUint32(
28,
44100*2,
true
);

view.setUint16(32,2,true);

view.setUint16(34,16,true);

writeString(view,36,'data');

view.setUint32(
40,
data.length*2,
true
);

let offset = 44;

for(
let i=0;
i<data.length;
i++
){

let sample =
Math.max(
-1,
Math.min(1,data[i])
);

view.setInt16(

offset,

sample < 0
? sample * 0x8000
: sample * 0x7FFF,

true
);

offset += 2;
}

const blob =
new Blob(
[view],
{type:'audio/wav'}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement('a');

a.href = url;

a.download =
'rizky-ai-loop.wav';

a.click();
}

</script>

</body>
</html>
