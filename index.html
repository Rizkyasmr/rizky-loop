<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rizky Smart Loop</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{

background:
linear-gradient(
135deg,
#0a1020,
#141c38,
#222b50
);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

color:white;
}

.container{

width:100%;
max-width:440px;

padding:24px;

border-radius:28px;

background:
rgba(255,255,255,0.05);

backdrop-filter:blur(16px);

border:
1px solid
rgba(255,255,255,0.08);

box-shadow:
0 0 40px
rgba(0,0,0,0.35);
}

.logo{

font-size:34px;

font-weight:bold;

text-align:center;

margin-bottom:5px;

background:
linear-gradient(
90deg,
#8ea2ff,
#d58fff
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;
}

.sub{

text-align:center;

font-size:13px;

opacity:0.7;

margin-bottom:22px;
}

.upload{

padding:28px;

border-radius:22px;

border:
2px dashed
rgba(255,255,255,0.15);

text-align:center;

cursor:pointer;

transition:0.2s;

background:
rgba(255,255,255,0.03);
}

.upload:hover{

background:
rgba(255,255,255,0.06);
}

select,
button{

width:100%;

padding:15px;

margin-top:14px;

border:none;

border-radius:18px;

font-size:15px;

font-weight:bold;

outline:none;
}

select{

background:
rgba(255,255,255,0.08);

color:white;
}

button{

cursor:pointer;

color:white;

background:
linear-gradient(
135deg,
#6d7dff,
#a85cff
);

transition:0.15s;
}

button:active{

transform:scale(0.96);
}

.stop{

background:
linear-gradient(
135deg,
#ff5d7a,
#ff7f7f
);
}

audio{

width:100%;

margin-top:18px;
}

.progress{

width:100%;

height:10px;

margin-top:18px;

border-radius:20px;

overflow:hidden;

background:
rgba(255,255,255,0.08);
}

.bar{

width:0%;

height:100%;

background:
linear-gradient(
90deg,
#7f8cff,
#d67dff
);

transition:0.3s;
}

#status{

margin-top:14px;

text-align:center;

font-size:14px;

opacity:0.9;
}

#loading{

display:none;

margin-top:20px;

text-align:center;
}

.loader{

width:70px;
height:70px;

margin:auto;

border-radius:50%;

border:
6px solid
rgba(255,255,255,0.08);

border-top:
6px solid #9d7dff;

animation:spin 0.8s linear infinite;
}

@keyframes spin{

100%{
transform:rotate(360deg);
}
}

.info{

margin-top:18px;

padding:14px;

border-radius:18px;

background:
rgba(255,255,255,0.04);

font-size:13px;

line-height:1.6;
}

.credit{

margin-top:18px;

text-align:center;

font-size:12px;

opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
RIZKY LOOP
</div>

<div class="sub">
AI Smart Seamless Audio Loop
</div>

<div
class="upload"
id="uploadBox">

🎵 Upload Audio

</div>

<input
type="file"
id="audioFile"
accept="audio/*"
hidden>

<select id="loopDuration">

<option value="5">
5 Menit
</option>

<option value="10">
10 Menit
</option>

<option value="30">
30 Menit
</option>

<option value="60">
1 Jam
</option>

<option value="120">
2 Jam
</option>

<option value="180">
3 Jam
</option>

<option value="240">
4 Jam
</option>

<option value="300">
5 Jam
</option>

<option value="360">
6 Jam
</option>

</select>

<button onclick="startLoop()">
START SMART LOOP
</button>

<button
class="stop"
onclick="stopLoop()">
STOP LOOP
</button>

<audio
id="player"
controls>
</audio>

<div class="progress">

<div
class="bar"
id="bar">

</div>

</div>

<div id="status">
Siap
</div>

<div id="loading">

<div class="loader"></div>

<p style="margin-top:12px">
AI mencari loop terbaik...
</p>

</div>

<div class="info">

✅ Auto cari titik loop terbaik<br>
✅ Auto gabung audio halus<br>
✅ Anti klik & anti jeda<br>
✅ Crossfade seamless AI

</div>

<div class="credit">
Made by Rizky
</div>

</div>

<script>

const uploadBox =
document.getElementById(
'uploadBox'
);

const audioInput =
document.getElementById(
'audioFile'
);

const player =
document.getElementById(
'player'
);

let audioContext =
new(
window.AudioContext ||
window.webkitAudioContext
)();

let audioBuffer;

let uploadedFile;

let currentSources = [];

let loopTimer;

let isPlaying = false;

let loopStart = 0;

let loopEnd = 0;

uploadBox.onclick = ()=>{

audioInput.click();
};

audioInput.addEventListener(
'change',
async e=>{

const file =
e.target.files[0];

if(!file) return;

uploadedFile = file;

const url =
URL.createObjectURL(file);

player.src = url;

const arrayBuffer =
await file.arrayBuffer();

audioBuffer =
await audioContext.decodeAudioData(
arrayBuffer
);

document.getElementById(
'status'
).innerText =
'Audio siap';
}
);

function showLoading(){

document.getElementById(
'loading'
).style.display='block';
}

function hideLoading(){

document.getElementById(
'loading'
).style.display='none';
}

function updateBar(v){

document.getElementById(
'bar'
).style.width =
v + '%';
}

async function startLoop(){

if(!audioBuffer){

alert(
'Upload audio dulu'
);

return;
}

stopLoop();

showLoading();

updateBar(10);

await wait(1000);

document.getElementById(
'status'
).innerText =
'AI scan waveform...';

const points =
findBestLoopPoints(
audioBuffer
);

loopStart =
points.start;

loopEnd =
points.end;

updateBar(45);

await wait(1200);

document.getElementById(
'status'
).innerText =
'Membuat seamless crossfade...';

updateBar(75);

await wait(1200);

updateBar(100);

await wait(700);

hideLoading();

playSmartLoop();
}

function findBestLoopPoints(buffer){

const data =
buffer.getChannelData(0);

const sampleRate =
buffer.sampleRate;

const total =
data.length;

let bestScore =
Infinity;

let bestStart =
sampleRate * 5;

let bestEnd =
total - (sampleRate * 5);

const compareSize =
sampleRate * 2;

for(

let start =
sampleRate * 3;

start <
total * 0.4;

start += 3000

){

for(

let end =
total * 0.6;

end <
total - compareSize;

end += 3000

){

let diff = 0;

for(
let i=0;
i<compareSize;
i++
){

diff += Math.abs(

data[start+i]
-
data[end+i]

);
}

diff /= compareSize;

if(diff < bestScore){

bestScore = diff;

bestStart = start;

bestEnd = end;
}
}
}

return{

start:
bestStart /
sampleRate,

end:
bestEnd /
sampleRate
};
}

function playSmartLoop(){

stopLoop();

isPlaying = true;

const crossfade = 3;

const sectionDuration =
loopEnd - loopStart;

const targetMinutes =
parseInt(

document.getElementById(
'loopDuration'
).value

);

const targetSeconds =
targetMinutes * 60;

let played = 0;

function schedule(){

if(!isPlaying) return;

if(played >= targetSeconds){

stopLoop();

document.getElementById(
'status'
).innerText =
'Loop selesai';

return;
}

const now =
audioContext.currentTime;

const source1 =
audioContext.createBufferSource();

const gain1 =
audioContext.createGain();

source1.buffer =
audioBuffer;

source1.connect(gain1);

gain1.connect(
audioContext.destination
);

source1.loop = false;

source1.start(
now,
loopStart,
sectionDuration
);

gain1.gain.setValueAtTime(
1,
now
);

gain1.gain.linearRampToValueAtTime(
0,
now + sectionDuration
);

const source2 =
audioContext.createBufferSource();

const gain2 =
audioContext.createGain();

source2.buffer =
audioBuffer;

source2.connect(gain2);

gain2.connect(
audioContext.destination
);

source2.start(
now + sectionDuration - crossfade,
loopStart,
sectionDuration
);

gain2.gain.setValueAtTime(
0,
now + sectionDuration - crossfade
);

gain2.gain.linearRampToValueAtTime(
1,
now + sectionDuration
);

currentSources.push(
source1,
source2
);

played +=
(sectionDuration - crossfade);

loopTimer = setTimeout(
schedule,
(sectionDuration - crossfade) * 1000
);
}

schedule();

document.getElementById(
'status'
).innerText =
'Smart seamless loop aktif';
}

function stopLoop(){

isPlaying = false;

clearTimeout(loopTimer);

currentSources.forEach(src=>{

try{
src.stop();
}catch(e){}
});

currentSources = [];

document.getElementById(
'status'
).innerText =
'Loop dihentikan';
}

function wait(ms){

return new Promise(
r=>setTimeout(r,ms)
);
}

</script>

</body>
</html>
