<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rizky Loop Audio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{

background:
linear-gradient(
135deg,
#0b1020,
#141b34,
#1e2850
);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

color:white;
}

.container{

width:100%;
max-width:430px;

padding:25px;

border-radius:28px;

background:
rgba(255,255,255,0.05);

backdrop-filter:blur(16px);

border:
1px solid
rgba(255,255,255,0.08);

box-shadow:
0 0 40px
rgba(0,0,0,0.3);
}

.logo{

font-size:34px;

font-weight:bold;

text-align:center;

margin-bottom:5px;

background:
linear-gradient(
90deg,
#8ea2ff,
#d58fff
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;
}

.sub{

text-align:center;

font-size:13px;

opacity:0.7;

margin-bottom:22px;
}

.upload{

padding:28px;

border-radius:22px;

border:
2px dashed
rgba(255,255,255,0.15);

text-align:center;

cursor:pointer;

transition:0.2s;

background:
rgba(255,255,255,0.03);
}

.upload:hover{

background:
rgba(255,255,255,0.06);
}

button{

width:100%;

padding:15px;

margin-top:14px;

border:none;

border-radius:18px;

font-size:15px;

font-weight:bold;

cursor:pointer;

color:white;

background:
linear-gradient(
135deg,
#6d7dff,
#a85cff
);

transition:0.15s;
}

button:active{

transform:scale(0.96);
}

.stop{

background:
linear-gradient(
135deg,
#ff5d7a,
#ff7f7f
);
}

audio{

width:100%;

margin-top:18px;
}

.progress{

width:100%;

height:10px;

margin-top:18px;

border-radius:20px;

overflow:hidden;

background:
rgba(255,255,255,0.08);
}

.bar{

width:0%;

height:100%;

background:
linear-gradient(
90deg,
#7f8cff,
#d67dff
);

transition:0.3s;
}

#status{

margin-top:14px;

text-align:center;

font-size:14px;

opacity:0.85;
}

#loading{

display:none;

margin-top:20px;

text-align:center;
}

.loader{

width:70px;
height:70px;

margin:auto;

border-radius:50%;

border:
6px solid
rgba(255,255,255,0.08);

border-top:
6px solid #9d7dff;

animation:spin 0.8s linear infinite;
}

@keyframes spin{

100%{
transform:rotate(360deg);
}
}

.credit{

margin-top:18px;

text-align:center;

font-size:12px;

opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
RIZKY LOOP
</div>

<div class="sub">
Simple Seamless Audio Loop
</div>

<div
class="upload"
id="uploadBox">

🎵 Upload Audio

</div>

<input
type="file"
id="audioFile"
accept="audio/*"
hidden>

<button onclick="startLoop()">
START LOOP
</button>

<button
class="stop"
onclick="stopLoop()">
STOP LOOP
</button>

<button onclick="downloadAudio()">
DOWNLOAD AUDIO
</button>

<audio
id="player"
controls>
</audio>

<div class="progress">

<div
class="bar"
id="bar">

</div>

</div>

<div id="status">
Siap
</div>

<div id="loading">

<div class="loader"></div>

<p style="margin-top:12px">
Membuat seamless loop...
</p>

</div>

<div class="credit">
Made by Rizky
</div>

</div>

<script>

const uploadBox =
document.getElementById(
'uploadBox'
);

const audioInput =
document.getElementById(
'audioFile'
);

const player =
document.getElementById(
'player'
);

let audioContext =
new(
window.AudioContext ||
window.webkitAudioContext
)();

let audioBuffer;

let currentSource = null;

let loopTimeout = null;

let uploadedFile;

uploadBox.onclick = ()=>{

audioInput.click();
};

audioInput.addEventListener(
'change',
async e=>{

const file =
e.target.files[0];

if(!file) return;

uploadedFile = file;

const url =
URL.createObjectURL(file);

player.src = url;

const arrayBuffer =
await file.arrayBuffer();

audioBuffer =
await audioContext.decodeAudioData(
arrayBuffer
);

document.getElementById(
'status'
).innerText =
'Audio siap diputar';
}
);

function showLoading(){

document.getElementById(
'loading'
).style.display='block';
}

function hideLoading(){

document.getElementById(
'loading'
).style.display='none';
}

function updateBar(v){

document.getElementById(
'bar'
).style.width =
v + '%';
}

async function startLoop(){

if(!audioBuffer){

alert(
'Upload audio dulu'
);

return;
}

showLoading();

updateBar(10);

await wait(800);

updateBar(40);

await wait(800);

updateBar(75);

await wait(900);

updateBar(100);

await wait(600);

hideLoading();

playSeamless();
}

function stopLoop(){

if(currentSource){

try{
currentSource.stop();
}catch(e){}
}

if(loopTimeout){

clearTimeout(loopTimeout);
}

currentSource = null;

document.getElementById(
'status'
).innerText =
'Loop dihentikan';
}

function playSeamless(){

stopLoop();

const crossfade = 3;

const duration =
audioBuffer.duration;

function play(){

const now =
audioContext.currentTime;

const source1 =
audioContext.createBufferSource();

const gain1 =
audioContext.createGain();

source1.buffer =
audioBuffer;

source1.connect(gain1);

gain1.connect(
audioContext.destination
);

gain1.gain.setValueAtTime(
1,
now
);

gain1.gain.linearRampToValueAtTime(
0,
now + duration
);

source1.start(now);

const source2 =
audioContext.createBufferSource();

const gain2 =
audioContext.createGain();

source2.buffer =
audioBuffer;

source2.connect(gain2);

gain2.connect(
audioContext.destination
);

gain2.gain.setValueAtTime(
0,
now + duration - crossfade
);

gain2.gain.linearRampToValueAtTime(
1,
now + duration
);

source2.start(
now + duration - crossfade
);

currentSource = source2;

loopTimeout = setTimeout(
play,
(duration - crossfade) * 1000
);
}

play();

document.getElementById(
'status'
).innerText =
'Loop seamless aktif';
}

function downloadAudio(){

if(!uploadedFile){

alert(
'Belum ada audio'
);

return;
}

const a =
document.createElement('a');

a.href =
URL.createObjectURL(
uploadedFile
);

a.download =
'rizky-loop-audio.wav';

a.click();
}

function wait(ms){

return new Promise(
r=>setTimeout(r,ms)
);
}

</script>

</body>
</html>
