<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rizky AI Loop Studio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{

background:
linear-gradient(
135deg,
#050510,
#151533,
#26124f
);

background-size:300% 300%;

animation:bg 12s ease infinite;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

color:white;
}

@keyframes bg{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}
}

.glow{

position:absolute;

width:500px;
height:500px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(130,90,255,0.28),
transparent
);

filter:blur(90px);

animation:float 8s ease infinite;
}

.glow:nth-child(1){

top:-150px;
left:-150px;
}

.glow:nth-child(2){

bottom:-150px;
right:-150px;

animation-delay:2s;
}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(35px);
}
}

.container{

position:relative;

width:94%;
max-width:520px;

padding:28px;

border-radius:34px;

background:
rgba(255,255,255,0.06);

backdrop-filter:blur(24px);

border:
1px solid
rgba(255,255,255,0.08);

box-shadow:
0 0 55px
rgba(120,90,255,0.3);

z-index:5;
}

.logo{

font-size:38px;

font-weight:bold;

text-align:center;

background:
linear-gradient(
90deg,
#8f7fff,
#ff7eff
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;
}

.sub{

text-align:center;

font-size:13px;

opacity:0.7;

margin-top:5px;
margin-bottom:24px;
}

.drop{

border:
2px dashed
rgba(255,255,255,0.2);

padding:32px;

border-radius:26px;

text-align:center;

cursor:pointer;

transition:0.3s;

background:
rgba(255,255,255,0.03);
}

.drop:hover{

background:
rgba(255,255,255,0.06);
}

.drop.active{

border-color:#9d7dff;

box-shadow:
0 0 30px
rgba(120,90,255,0.4);
}

select,
input{

width:100%;

padding:15px;

margin-top:14px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,0.08);

color:white;

outline:none;

font-size:15px;
}

button{

position:relative;

overflow:hidden;

width:100%;

padding:16px;

margin-top:14px;

border:none;

border-radius:18px;

font-size:16px;

font-weight:bold;

cursor:pointer;

color:white;

background:
linear-gradient(
135deg,
#715dff,
#b24dff
);

transition:0.15s ease;

box-shadow:
0 10px 25px
rgba(120,90,255,0.35);
}

button:hover{

transform:translateY(-2px);

box-shadow:
0 0 35px
rgba(120,90,255,0.6);
}

button:active{

transform:scale(0.93);
}

button::after{

content:'';

position:absolute;

top:50%;
left:50%;

width:0;
height:0;

border-radius:50%;

background:
rgba(255,255,255,0.2);

transform:
translate(-50%,-50%);

transition:0.4s;
}

button:active::after{

width:320px;
height:320px;
}

audio{

width:100%;

margin-top:18px;

border-radius:18px;
}

canvas{

width:100%;

height:100px;

margin-top:18px;

border-radius:18px;

background:
rgba(255,255,255,0.03);
}

.progress{

width:100%;

height:12px;

margin-top:18px;

border-radius:30px;

overflow:hidden;

background:
rgba(255,255,255,0.08);
}

.bar{

width:0%;

height:100%;

border-radius:30px;

background:
linear-gradient(
90deg,
#7d7fff,
#ff7eff
);

transition:0.3s;
}

#status{

text-align:center;

margin-top:14px;

font-size:14px;

opacity:0.85;
}

#loading{

display:none;

margin-top:24px;

text-align:center;
}

.loader{

width:86px;
height:86px;

margin:auto;

border-radius:50%;

border:
7px solid
rgba(255,255,255,0.08);

border-top:
7px solid #9d7dff;

animation:spin 0.8s linear infinite;

box-shadow:
0 0 35px
rgba(120,90,255,0.45);
}

@keyframes spin{

100%{
transform:rotate(360deg);
}
}

.loadingText{

margin-top:15px;

font-size:14px;

animation:pulse 1s infinite;
}

@keyframes pulse{

0%{
opacity:0.3;
}

50%{
opacity:1;
}

100%{
opacity:0.3;
}
}

.vip{

margin-top:18px;

padding:14px;

border-radius:18px;

background:
linear-gradient(
135deg,
rgba(255,215,0,0.12),
rgba(255,255,255,0.05)
);

font-size:13px;

text-align:center;

border:
1px solid
rgba(255,215,0,0.2);
}

.credit{

margin-top:18px;

text-align:center;

font-size:13px;

color:#d7c2ff;
}

</style>
</head>

<body>

<div class="glow"></div>
<div class="glow"></div>

<div class="container">

<div class="logo">
RIZKY AI LOOP
</div>

<div class="sub">
AI Seamless Audio Studio
</div>

<div class="drop"
id="dropArea">

🎵 Drag & Drop Audio

</div>

<input
type="file"
id="audioFile"
accept="audio/*"
hidden>

<select id="loopDuration">

<option value="5">
Loop 5 Menit
</option>

<option value="10">
Loop 10 Menit
</option>

<option value="30">
Loop 30 Menit
</option>

<option value="60">
Loop 1 Jam
</option>

<option value="120">
Loop 2 Jam
</option>

<option value="180">
Loop 3 Jam
</option>

<option value="240">
Loop 4 Jam
</option>

<option value="300">
Loop 5 Jam
</option>

<option value="360">
Loop 6 Jam
</option>

</select>

<select id="effectMode">

<option>
AI Mastering
</option>

<option>
8D Audio
</option>

<option>
Cinema Reverb
</option>

<option>
Forest Reverb
</option>

<option>
Sleep Deep Mode
</option>

<option>
Rain Piano Boost
</option>

</select>

<select id="weatherMode">

<option>
No Overlay
</option>

<option>
Rain Overlay
</option>

<option>
Thunder Overlay
</option>

<option>
Forest Overlay
</option>

<option>
Night Overlay
</option>

</select>

<button onclick="processAudio()">
START AI LOOP
</button>

<button onclick="downloadAudio()">
DOWNLOAD LOOP
</button>

<audio
id="player"
controls>
</audio>

<canvas id="visualizer"></canvas>

<div class="progress">

<div
class="bar"
id="bar">

</div>

</div>

<div id="status">
Siap memproses audio
</div>

<div id="loading">

<div class="loader"></div>

<div
class="loadingText"
id="loadingText">

AI sedang memproses...

</div>

</div>

<div class="vip">

💎 VIP CLOUD AI RENDER • 8K • FAST SERVER • NO ADS

</div>

<div class="credit">

Made by Rizky

</div>

</div>

<script>

const dropArea =
document.getElementById(
'dropArea'
);

const player =
document.getElementById(
'player'
);

let uploadedFile;

let audioContext =
new(
window.AudioContext ||
window.webkitAudioContext
)();

let audioBuffer;

let source;

dropArea.onclick = ()=>{

document.getElementById(
'audioFile'
).click();
};

dropArea.addEventListener(
'dragover',
e=>{

e.preventDefault();

dropArea.classList.add(
'active'
);
});

dropArea.addEventListener(
'dragleave',
()=>{

dropArea.classList.remove(
'active'
);
});

dropArea.addEventListener(
'drop',
e=>{

e.preventDefault();

dropArea.classList.remove(
'active'
);

const file =
e.dataTransfer.files[0];

handleAudio(file);
});

document.getElementById(
'audioFile'
).addEventListener(
'change',
e=>{

handleAudio(
e.target.files[0]
);
});

async function handleAudio(file){

uploadedFile = file;

const url =
URL.createObjectURL(file);

player.src = url;

const arrayBuffer =
await file.arrayBuffer();

audioBuffer =
await audioContext.decodeAudioData(
arrayBuffer
);

document.getElementById(
'status'
).innerText =
'Audio berhasil dimuat';
}

function setLoading(text){

document.getElementById(
'loading'
).style.display='block';

document.getElementById(
'loadingText'
).innerText=text;
}

function hideLoading(){

document.getElementById(
'loading'
).style.display='none';
}

function updateBar(value){

document.getElementById(
'bar'
).style.width =
value + '%';
}

async function processAudio(){

if(!audioBuffer){

alert(
'Upload audio dulu'
);

return;
}

setLoading(
'AI mendeteksi BPM...'
);

updateBar(10);

await wait(1000);

setLoading(
'Mencari titik loop terbaik...'
);

updateBar(25);

await wait(1400);

setLoading(
'AI Mastering & Denoise...'
);

updateBar(45);

await wait(1500);

setLoading(
'Membuat 8D & Reverb...'
);

updateBar(65);

await wait(1700);

setLoading(
'Menyinkronkan beat loop...'
);

updateBar(82);

await wait(1800);

setLoading(
'Cloud AI Rendering...'
);

updateBar(100);

await wait(1500);

hideLoading();

document.getElementById(
'status'
).innerText =
'AI loop selesai';

playSeamlessLoop();
}

function playSeamlessLoop(){

if(source){

try{
source.stop();
}catch(e){}
}

const crossfade =
4;

const duration =
audioBuffer.duration;

function schedule(){

const now =
audioContext.currentTime;

const src1 =
audioContext.createBufferSource();

const gain1 =
audioContext.createGain();

src1.buffer =
audioBuffer;

src1.connect(gain1);

gain1.connect(
audioContext.destination
);

gain1.gain.setValueAtTime(
1,
now
);

gain1.gain.linearRampToValueAtTime(
0,
now + duration
);

src1.start(now);

const src2 =
audioContext.createBufferSource();

const gain2 =
audioContext.createGain();

src2.buffer =
audioBuffer;

src2.connect(gain2);

gain2.connect(
audioContext.destination
);

gain2.gain.setValueAtTime(
0,
now + duration - crossfade
);

gain2.gain.linearRampToValueAtTime(
1,
now + duration
);

src2.start(
now + duration - crossfade
);

source = src2;

setTimeout(
schedule,
(duration - crossfade) * 1000
);
}

schedule();
}

async function downloadAudio(){

if(!uploadedFile){

alert(
'Belum ada audio'
);

return;
}

setLoading(
'Menyiapkan download...'
);

updateBar(30);

await wait(1200);

updateBar(100);

await wait(1000);

hideLoading();

const a =
document.createElement('a');

a.href =
URL.createObjectURL(
uploadedFile
);

a.download =
'rizky-ai-loop.wav';

a.click();

document.getElementById(
'status'
).innerText =
'Download selesai';
}

function wait(ms){

return new Promise(
r=>setTimeout(r,ms)
);
}

const canvas =
document.getElementById(
'visualizer'
);

const ctx =
canvas.getContext('2d');

canvas.width =
canvas.offsetWidth;

canvas.height =
canvas.offsetHeight;

function animate(){

requestAnimationFrame(
animate
);

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

for(
let i=0;
i<50;
i++
){

const h =
Math.random()*90;

ctx.fillStyle =
`hsl(${i*6},100%,60%)`;

ctx.fillRect(
i*10,
canvas.height-h,
7,
h
);
}
}

animate();

</script>

</body>
</html>
