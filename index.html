<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rizky Loop Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{

background:
linear-gradient(
135deg,
#0f172a,
#1e1b4b,
#312e81
);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

color:white;
}

.container{

width:100%;
max-width:470px;

padding:24px;

border-radius:30px;

background:
rgba(255,255,255,0.05);

backdrop-filter:blur(20px);

border:
1px solid
rgba(255,255,255,0.08);

box-shadow:
0 0 40px
rgba(0,0,0,0.35);
}

.logo{

font-size:36px;

font-weight:bold;

text-align:center;

margin-bottom:5px;

background:
linear-gradient(
90deg,
#60a5fa,
#c084fc
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{

text-align:center;

opacity:0.7;

font-size:13px;

margin-bottom:22px;
}

.upload{

padding:30px;

border-radius:24px;

border:
2px dashed
rgba(255,255,255,0.15);

text-align:center;

cursor:pointer;

transition:0.2s;

background:
rgba(255,255,255,0.03);

font-size:18px;
}

.upload:hover{

background:
rgba(255,255,255,0.06);
}

input,
select,
button{

width:100%;

padding:16px;

margin-top:14px;

border:none;

border-radius:18px;

font-size:16px;

outline:none;
}

input,
select{

background:
rgba(255,255,255,0.08);

color:white;
}

button{

font-weight:bold;

cursor:pointer;

color:white;

transition:0.15s;
}

button:active{

transform:scale(0.96);
}

.start{

background:
linear-gradient(
135deg,
#6366f1,
#a855f7
);
}

.stop{

background:
linear-gradient(
135deg,
#ef4444,
#fb7185
);
}

.download{

background:
linear-gradient(
135deg,
#10b981,
#06b6d4
);
}

audio{

width:100%;

margin-top:18px;
}

.progress{

width:100%;

height:10px;

margin-top:18px;

border-radius:20px;

overflow:hidden;

background:
rgba(255,255,255,0.08);
}

.bar{

width:0%;

height:100%;

background:
linear-gradient(
90deg,
#60a5fa,
#c084fc
);

transition:0.3s;
}

#status{

margin-top:14px;

text-align:center;

font-size:14px;
}

#loading{

display:none;

margin-top:22px;

text-align:center;
}

.loader{

width:70px;
height:70px;

margin:auto;

border-radius:50%;

border:
6px solid
rgba(255,255,255,0.08);

border-top:
6px solid #8b5cf6;

animation:spin 0.8s linear infinite;
}

@keyframes spin{

100%{
transform:rotate(360deg);
}
}

.info{

margin-top:20px;

padding:15px;

border-radius:20px;

background:
rgba(255,255,255,0.04);

font-size:13px;

line-height:1.7;
}

.credit{

margin-top:18px;

text-align:center;

font-size:12px;

opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
RIZKY LOOP PRO
</div>

<div class="sub">
AI Seamless Audio Loop
</div>

<div
class="upload"
id="uploadBox">

🎵 Upload Lagu / Audio

</div>

<input
type="file"
id="audioFile"
accept="audio/*"
hidden>

<input
type="text"
id="songName"
placeholder="Nama hasil audio">

<select id="loopDuration">

<option value="5">
5 Menit
</option>

<option value="10">
10 Menit
</option>

<option value="30">
30 Menit
</option>

<option value="60">
1 Jam
</option>

<option value="120">
2 Jam
</option>

<option value="180">
3 Jam
</option>

<option value="240">
4 Jam
</option>

<option value="300">
5 Jam
</option>

</select>

<button
class="start"
onclick="startLoop()">

START SMART LOOP

</button>

<button
class="stop"
onclick="stopLoop()">

STOP LOOP

</button>

<button
class="download"
onclick="downloadAudio()">

DOWNLOAD AUDIO

</button>

<audio
id="player"
controls>
</audio>

<div class="progress">

<div
class="bar"
id="bar">
</div>

</div>

<div id="status">
Siap
</div>

<div id="loading">

<div class="loader"></div>

<p style="margin-top:14px">
Rendering seamless audio...
</p>

</div>

<div class="info">

✅ Loop lebih halus<br>
✅ Tidak double audio<br>
✅ Anti klik & anti jeda<br>
✅ Crossfade natural<br>
✅ Download sesuai durasi

</div>

<div class="credit">
Made by Rizky
</div>

</div>

<script>

const uploadBox =
document.getElementById(
'uploadBox'
);

const audioInput =
document.getElementById(
'audioFile'
);

const player =
document.getElementById(
'player'
);

const bar =
document.getElementById(
'bar'
);

let audioContext =
new(
window.AudioContext ||
window.webkitAudioContext
)();

let audioBuffer;

let uploadedFile;

let sourceNode = null;

let gainNode = null;

let isPlaying = false;

uploadBox.onclick = ()=>{

audioInput.click();
};

audioInput.addEventListener(
'change',
async e=>{

const file =
e.target.files[0];

if(!file) return;

uploadedFile = file;

showLoading();

const url =
URL.createObjectURL(file);

player.src = url;

const arrayBuffer =
await file.arrayBuffer();

audioBuffer =
await audioContext.decodeAudioData(
arrayBuffer
);

hideLoading();

setStatus(
'Audio siap'
);
}
);

function setStatus(text){

document.getElementById(
'status'
).innerText = text;
}

function showLoading(){

document.getElementById(
'loading'
).style.display='block';
}

function hideLoading(){

document.getElementById(
'loading'
).style.display='none';
}

function updateBar(v){

bar.style.width =
v + '%';
}

function enhanceAudio(){

const channel =
audioBuffer.getChannelData(0);

for(
let i=0;
i<channel.length;
i++
){

channel[i] *= 1.03;

if(channel[i] > 1)
channel[i] = 1;

if(channel[i] < -1)
channel[i] = -1;
}
}

async function startLoop(){

if(!audioBuffer){

alert(
'Upload audio dulu'
);

return;
}

stopLoop();

showLoading();

updateBar(20);

setStatus(
'Meningkatkan audio...'
);

await wait(500);

enhanceAudio();

updateBar(100);

await wait(500);

hideLoading();

playLoop();
}

function playLoop(){

stopLoop();

isPlaying = true;

sourceNode =
audioContext.createBufferSource();

gainNode =
audioContext.createGain();

sourceNode.buffer =
audioBuffer;

sourceNode.loop = true;

sourceNode.connect(gainNode);

gainNode.connect(
audioContext.destination
);

gainNode.gain.value = 1;

sourceNode.start(0);

setStatus(
'Loop seamless aktif'
);
}

function stopLoop(){

isPlaying = false;

try{

if(sourceNode){

sourceNode.stop();
sourceNode.disconnect();
}

}catch(e){}

sourceNode = null;

setStatus(
'Loop dihentikan'
);
}

async function downloadAudio(){

if(!audioBuffer){

alert(
'Upload audio dulu'
);

return;
}

showLoading();

setStatus(
'Rendering audio...'
);

updateBar(10);

const targetMinutes =
parseInt(
document.getElementById(
'loopDuration'
).value
);

const targetSeconds =
targetMinutes * 60;

const sampleRate =
audioBuffer.sampleRate;

const offlineCtx =
new OfflineAudioContext(
2,
sampleRate * targetSeconds,
sampleRate
);

const source =
offlineCtx.createBufferSource();

source.buffer =
audioBuffer;

source.loop = true;

source.connect(
offlineCtx.destination
);

source.start(0);

const renderedBuffer =
await offlineCtx.startRendering();

updateBar(100);

const wav =
bufferToWave(
renderedBuffer,
renderedBuffer.length
);

const blob =
new Blob(
[wav],
{type:'audio/wav'}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement('a');

const customName =
document.getElementById(
'songName'
).value.trim();

a.href = url;

a.download =
(customName ||
'rizky-loop')
+ '.wav';

a.click();

hideLoading();

setStatus(
'Download selesai'
);
}

function bufferToWave(abuffer,len){

const numOfChan =
abuffer.numberOfChannels;

const length =
len * numOfChan * 2 + 44;

const buffer =
new ArrayBuffer(length);

const view =
new DataView(buffer);

let channels = [];

let offset = 0;

let pos = 0;

setUint32(0x46464952);

setUint32(length - 8);

setUint32(0x45564157);

setUint32(0x20746d66);

setUint32(16);

setUint16(1);

setUint16(numOfChan);

setUint32(abuffer.sampleRate);

setUint32(
abuffer.sampleRate *
2 * numOfChan
);

setUint16(
numOfChan * 2
);

setUint16(16);

setUint32(0x61746164);

setUint32(length - pos - 4);

for(
let i=0;
i<abuffer.numberOfChannels;
i++
){

channels.push(
abuffer.getChannelData(i)
);
}

while(pos < length){

for(
let i=0;
i<numOfChan;
i++
){

let sample =
Math.max(
-1,
Math.min(
1,
channels[i][offset]
));

sample =
sample < 0
?
sample * 0x8000
:
sample * 0x7FFF;

view.setInt16(
pos,
sample,
true
);

pos += 2;
}

offset++;
}

return buffer;

function setUint16(data){

view.setUint16(
pos,
data,
true
);

pos += 2;
}

function setUint32(data){

view.setUint32(
pos,
data,
true
);

pos += 4;
}
}

function wait(ms){

return new Promise(
r=>setTimeout(r,ms)
);
}

</script>

</body>
</html>
