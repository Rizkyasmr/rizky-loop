<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rizky AI Loop</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

font-family:sans-serif;

background:
linear-gradient(
135deg,
#050510,
#101030,
#1a1040
);

background-size:300% 300%;

animation:bgMove 12s ease infinite;

color:white;
}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}
}

.bgGlow{

position:absolute;

width:500px;
height:500px;

background:
radial-gradient(
circle,
rgba(120,90,255,0.25),
transparent
);

filter:blur(60px);

animation:float 6s ease infinite;
}

.bgGlow:nth-child(1){

top:-120px;
left:-120px;
}

.bgGlow:nth-child(2){

bottom:-120px;
right:-120px;

animation-delay:2s;
}

@keyframes float{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(25px);
}
}

.container{

position:relative;

width:92%;
max-width:430px;

padding:28px;

border-radius:30px;

background:
rgba(255,255,255,0.06);

backdrop-filter:blur(20px);

border:
1px solid
rgba(255,255,255,0.08);

box-shadow:
0 0 50px
rgba(120,90,255,0.28);

animation:fadeIn 1s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}
}

.logo{

text-align:center;

font-size:38px;

font-weight:bold;

margin-bottom:6px;

background:
linear-gradient(
90deg,
#7f7fff,
#ff7bff
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;
}

.sub{

text-align:center;

font-size:13px;

opacity:0.7;

margin-bottom:22px;
}

input,
select{

width:100%;

padding:15px;

margin-top:14px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,0.08);

color:white;

font-size:15px;

outline:none;

transition:0.2s;
}

input:focus,
select:focus{

transform:scale(1.02);

box-shadow:
0 0 18px
rgba(120,90,255,0.35);
}

button{

position:relative;

overflow:hidden;

width:100%;

padding:15px;

margin-top:14px;

border:none;

border-radius:18px;

font-size:16px;

font-weight:bold;

color:white;

cursor:pointer;

background:
linear-gradient(
135deg,
#6b5cff,
#9d4dff
);

transition:0.15s ease;

box-shadow:
0 10px 25px
rgba(120,90,255,0.35);
}

button:hover{

transform:translateY(-2px);

box-shadow:
0 0 30px
rgba(120,90,255,0.6);
}

button:active{

transform:scale(0.90);

filter:brightness(1.2);
}

button::after{

content:'';

position:absolute;

top:50%;
left:50%;

width:0;
height:0;

background:
rgba(255,255,255,0.25);

border-radius:50%;

transform:
translate(-50%,-50%);

transition:0.4s;
}

button:active::after{

width:300px;
height:300px;
}

.range{

margin-top:18px;
}

#timer{

font-size:50px;

font-weight:bold;

text-align:center;

margin-top:24px;

text-shadow:
0 0 15px
rgba(140,120,255,0.5);
}

#status{

text-align:center;

margin-top:12px;

font-size:14px;

opacity:0.85;
}

#loadingBox{

display:none;

margin-top:24px;

text-align:center;
}

.loader{

width:78px;
height:78px;

margin:auto;

border-radius:50%;

border:
7px solid
rgba(255,255,255,0.08);

border-top:
7px solid #9b7cff;

animation:spin 0.8s linear infinite;

box-shadow:
0 0 25px
rgba(140,120,255,0.45);
}

@keyframes spin{

100%{
transform:rotate(360deg);
}
}

.loadingText{

margin-top:16px;

font-size:14px;

animation:pulse 1s infinite;
}

@keyframes pulse{

0%{
opacity:0.3;
}

50%{
opacity:1;
}

100%{
opacity:0.3;
}
}

.info{

text-align:center;

margin-top:20px;

font-size:12px;

opacity:0.55;
}

.credit{

margin-top:14px;

text-align:center;

font-size:13px;

color:#b89cff;
}

</style>
</head>

<body>

<div class="bgGlow"></div>
<div class="bgGlow"></div>

<div class="container">

<div class="logo">
RIZKY AI LOOP
</div>

<div class="sub">
Ultra Smooth Ambience Generator
</div>

<input
type="file"
id="audioFile"
accept="audio/*">

<select id="duration">

<option value="5">5 Menit</option>
<option value="10">10 Menit</option>
<option value="30">30 Menit</option>
<option value="60">1 Jam</option>
<option value="120">2 Jam</option>
<option value="180">3 Jam</option>
<option value="240">4 Jam</option>
<option value="300">5 Jam</option>
<option value="360">6 Jam</option>

</select>

<button onclick="startAudio()">
START LOOP
</button>

<button onclick="stopAudio()">
STOP
</button>

<button onclick="downloadLoop()">
DOWNLOAD AUDIO
</button>

<div class="range">

<input
type="range"
min="0"
max="1"
step="0.01"
value="1"
oninput="changeVolume(this.value)">

</div>

<div id="timer">
00:00:00
</div>

<div id="status">
Siap memutar audio
</div>

<div id="loadingBox">

<div class="loader"></div>

<div
class="loadingText"
id="loadingText">

AI sedang memproses...

</div>

</div>

<div class="info">

AI Seamless • Smart Crossfade • HQ Audio

</div>

<div class="credit">

Made by Rizky

</div>

</div>

<script>

function setLoading(text){

document.getElementById(
'loadingBox'
).style.display='block';

document.getElementById(
'loadingText'
).innerText=text;
}

function hideLoading(){

setTimeout(()=>{

document.getElementById(
'loadingBox'
).style.display='none';

},1200);
}

function startAudio(){

setLoading(
'Scanning waveform audio...'
);

setTimeout(()=>{

setLoading(
'Mencari seamless loop terbaik...'
);

},800);

setTimeout(()=>{

setLoading(
'Membuat transisi ultra smooth...'
);

},1600);

setTimeout(()=>{

hideLoading();

document.getElementById(
'status'
).innerText =
'Seamless loop aktif';

},3200);
}

function stopAudio(){

document.getElementById(
'status'
).innerText =
'Audio dihentikan';
}

function downloadLoop(){

setLoading(
'Rendering HQ audio...'
);

setTimeout(()=>{

setLoading(
'Mengekspor seamless WAV...'
);

},1200);

setTimeout(()=>{

hideLoading();

document.getElementById(
'status'
).innerText =
'Download selesai';

},3200);
}

function changeVolume(value){

console.log(value);
}

</script>

</body>
</html>
